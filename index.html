<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biotchelly CRM | Elite Dashboard</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Drag and Drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #0a0b10;
            --card-bg: #151921;
            --accent: #d4af37; /* Dourado Biotchelly */
            --accent-glow: rgba(212, 175, 55, 0.3);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border: #1e293b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Glassmorphism Header */
        header {
            height: 70px;
            background: rgba(21, 25, 33, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span { color: var(--accent); }

        .stats-bar {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            background: var(--card-bg);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Kanban Layout */
        .kanban-container {
            display: flex;
            gap: 20px;
            padding: 30px;
            height: calc(100vh - 70px);
            overflow-x: auto;
            align-items: flex-start;
        }

        .column {
            background: rgba(21, 25, 33, 0.5);
            min-width: 320px;
            max-width: 320px;
            border-radius: 15px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            max-height: 100%;
        }

        .column-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .column-title {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        .column-count {
            background: var(--border);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
        }

        .cards-container {
            padding: 15px;
            overflow-y: auto;
            flex-grow: 1;
            min-height: 150px;
        }

        /* Lead Card */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: grab;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: var(--accent);
            opacity: 0.5;
        }

        .card-name {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 8px;
            display: block;
        }

        .card-info {
            font-size: 0.8rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 5px;
        }

        .card-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
            background: rgba(255,255,255,0.05);
            margin-top: 10px;
            border: 1px solid var(--border);
        }

        /* Animations */
        .ghost {
            opacity: 0.4;
            background: var(--accent-glow) !important;
        }

        /* Loading Overlay */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 20px; font-size: 0.8rem; color: var(--text-dim);">Sincronizando Ecossistema Biotchelly...</p>
    </div>

    <header>
        <div class="logo">BIOTCHELLY <span>CRM</span></div>
        <div class="stats-bar">
            <div class="stat-item"><i data-lucide="users" size="14"></i> <span id="total-leads">0</span> Leads</div>
            <div class="stat-item"><i data-lucide="zap" size="14"></i> <span id="agentes-ativos">4</span> Agentes</div>
            <div class="stat-item" style="border-color: var(--success); color: var(--success);">
                <i data-lucide="check-circle" size="14"></i> Sistema Operacional
            </div>
        </div>
        <div style="display: flex; gap: 10px;">
             <button onclick="fetchLeads()" style="background: none; border: 1px solid var(--border); color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                <i data-lucide="refresh-cw" size="14"></i> Atualizar
             </button>
        </div>
    </header>

    <main class="kanban-container" id="kanban">
        <!-- Coluna: Novo -->
        <div class="column">
            <div class="column-header">
                <span class="column-title">Novo</span>
                <span class="column-count" id="count-novo">0</span>
            </div>
            <div class="cards-container" id="novo"></div>
        </div>

        <!-- Coluna: Briefing -->
        <div class="column">
            <div class="column-header">
                <span class="column-title">Briefing</span>
                <span class="column-count" id="count-briefing">0</span>
            </div>
            <div class="cards-container" id="briefing"></div>
        </div>

        <!-- Coluna: Qualificador -->
        <div class="column">
            <div class="column-header">
                <span class="column-title">Qualificador</span>
                <span class="column-count" id="count-qualificador">0</span>
            </div>
            <div class="cards-container" id="qualificador"></div>
        </div>

        <!-- Coluna: Follow-up -->
        <div class="column">
            <div class="column-header">
                <span class="column-title">Follow-up</span>
                <span class="column-count" id="count-followup">0</span>
            </div>
            <div class="cards-container" id="followup"></div>
        </div>

        <!-- Coluna: Fechamento -->
        <div class="column">
            <div class="column-header">
                <span class="column-title">Fechamento</span>
                <span class="column-count" id="count-fechamento">0</span>
            </div>
            <div class="cards-container" id="fechamento"></div>
        </div>
    </main>

    <script>
        // CONFIGURAÇÃO DE CONEXÃO (V6.0 - SNIPER MODE)
        const KESTRA_URL = "https://kestra.biotchellyprospecta.online"; 
        const WEBHOOK_PATH = "/api/v1/executions/webhook/biotchellymcp/08_biotchelly_crm_backend/biotchelly_backend_key";
        const PROXY_URL = "https://falling-term-7c4e.maxyadm.workers.dev"; // Seu Proxy Privado

        async function kbSmartFetch(targetUrl, action) {
            const fullUrl = `${targetUrl}${targetUrl.includes('?') ? '&' : '?'}action=${action}`;
            
            // Tentativa 1: Direta (Requer Extensão CORS no Chrome)
            try {
                console.log("🚀 Tentativa Direta...");
                const res = await fetch(fullUrl);
                if (res.ok) return await res.json();
            } catch (e) {
                console.warn("⚠️ Falha na conexão direta (CORS). Tentando Proxy Privado...");
            }

            // Tentativa 2: Seu Proxy Privado (Modo Turbo)
            try {
                const proxyCall = `${PROXY_URL}/?url=${encodeURIComponent(fullUrl)}`;
                const res = await fetch(proxyCall);
                if (res.ok) return await res.json();
            } catch (e) {
                console.warn("⚠️ Falha no Proxy Privado. Tentando Proxy Público...");
            }

            // Tentativa 3: Proxy Público (CORS Anywhere)
            try {
                const publicProxy = `https://corsproxy.io/?${encodeURIComponent(fullUrl)}`;
                const res = await fetch(publicProxy);
                if (res.ok) return await res.json();
            } catch (e) {
                throw new Error("Todas as tentativas de conexão (Direta, Privada e Pública) falharam.");
            }
        }

        async function fetchLeads() {
            try {
                document.getElementById('loader').style.display = 'flex';
                document.getElementById('loader').style.opacity = '1';

                // Chamada via SmartFetch (Proxy-Aware)
                const rawData = await kbSmartFetch(`${KESTRA_URL}${WEBHOOK_PATH}`, 'list_leads');
                console.log("📦 Dados brutos:", rawData);

                // O Kestra com returnOutputs pode colocar o resultado em data.body ou data.leads
                const data = rawData.body || rawData;
                const leads = data.leads || [];
                
                // Limpar colunas
                document.querySelectorAll('.cards-container').forEach(c => c.innerHTML = '');
                document.getElementById('total-leads').innerText = leads.length;

                const counts = { novo: 0, briefing: 0, qualificador: 0, followup: 0, fechamento: 0 };

                leads.forEach(lead => {
                    const card = createCard(lead);
                    const status = lead.status?.toLowerCase() || 'novo';
                    const container = document.getElementById(status) || document.getElementById('novo');
                    if (container) {
                        container.appendChild(card);
                        counts[status] = (counts[status] || 0) + 1;
                    }
                });

                // Atualizar contadores
                Object.keys(counts).forEach(key => {
                    const el = document.getElementById(`count-${key}`);
                    if(el) el.innerText = counts[key];
                });

                lucide.createIcons();
                
                // Esconder loader
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
                }, 800);

            } catch (error) {
                console.error("❌ Erro na API:", error);
                alert(`Falha na conexão: ${error.message}\n\nVerifique se o seu Kestra está online e se o gatilho de Webhook está ativo.`);
            }
        }

        function createCard(lead) {
            const div = document.createElement('div');
            div.className = 'card';
            div.setAttribute('data-id', lead.id);
            div.innerHTML = `
                <span class="card-name">${lead.nome || 'Sem Nome'}</span>
                <div class="card-info"><i data-lucide="phone" size="12"></i> ${lead.telefone || '-'}</div>
                <div class="card-info"><i data-lucide="map-pin" size="12"></i> ${lead.perfil || 'Lead Geral'}</div>
                <div class="card-tag">${lead.etiquetas || 'biotchelly_lead'}</div>
            `;
            return div;
        }

        async function updateLeadStatus(leadId, newStatus) {
            console.log(`Movendo lead ${leadId} para ${newStatus}`);
            try {
                await kbSmartFetch(`${KESTRA_URL}${WEBHOOK_PATH}`, `update_status&lead_id=${leadId}&status=${newStatus}`);
            } catch (error) {
                console.error("Erro ao atualizar status:", error);
            }
        }

        // Inicializar Drag and Drop
        document.querySelectorAll('.cards-container').forEach(container => {
            new Sortable(container, {
                group: 'kanban',
                animation: 150,
                ghostClass: 'ghost',
                onEnd: async (evt) => {
                    const leadId = evt.item.getAttribute('data-id');
                    const newStatus = evt.to.id;
                    await updateLeadStatus(leadId, newStatus);
                    
                    // Atualizar contadores locais
                    fetchLeads(); 
                }
            });
        });

        // Start
        window.onload = () => {
            lucide.createIcons();
            fetchLeads();
        };
    </script>
</body>
</html>
