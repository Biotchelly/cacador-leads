<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caçador de Leads | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root, [data-theme="dark"] {
            --bg-color: #111111;
            --card-bg: #1a1c1e;
            --border-color: #1e2124;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-color: #1f93ff;
            --success-color: #10b981;
            --font-main: 'Inter', sans-serif;
            --col-novo: #22252b; --col-novo-b: #31363f;
            --col-pente: #332b1a; --col-pente-b: #453b24;
            --col-aberto: #1a2333; --col-aberto-b: #242e45;
            --col-qualif: #132d1e; --col-qualif-b: #1a3d2c;
            --col-negoc: #3d2b1a; --col-negoc-b: #553b24;
            --col-conv: #0c332b; --col-conv-b: #0c4a3e;
            --col-perd: #330f0f; --col-perd-b: #4a1515;
            --col-count-bg: rgba(255, 255, 255, .12);
        }

        [data-theme="light"] {
            --bg-color: #f4f7fb;
            --card-bg: #ffffff;
            --border-color: #eef1f5;
            --text-primary: #2e334e;
            --text-secondary: #737ea7;
            --accent-color: #0366d6;
            --success-color: #10b981;
            --col-novo: #f0f2f5; --col-novo-b: #d0d7de;
            --col-pente: #fff9db; --col-pente-b: #fcc419;
            --col-aberto: #e7f5ff; --col-aberto-b: #339af0;
            --col-qualif: #ebfbee; --col-qualif-b: #40c057;
            --col-negoc: #fff4e6; --col-negoc-b: #fd7e14;
            --col-conv: #e6fcf5; --col-conv-b: #38d9a9;
            --col-perd: #fff5f5; --col-perd-b: #fa5252;
            --col-count-bg: rgba(0, 0, 0, .05);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
        }
        /* ═══════════ TABS ═══════════ */
        .tabs-nav {
            display: flex;
            gap: 0;
            background: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            padding: 0 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tab-btn {
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            padding: 0.6rem 1rem;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: var(--font-main);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: -1px;
        }

        .tab-btn:hover {
            color: var(--text-primary);
        }

        .tab-btn.active {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* ═══════════ KANBAN ═══════════ */
        #kanban-panel {
            background: var(--bg-color);
            min-height: calc(100vh - 40px);
            display: none;
            flex-direction: column;
        }

        #kanban-panel.active {
            display: flex;
        }

        .kb-toolbar {
            padding: 6px 14px;
            background: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 90;
        }

        .kb-toolbar input,
        .kb-toolbar select {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 6px;
            font-family: inherit;
        }

        .kb-btn {
            background: var(--accent-color);
            color: #fff;
            border: none;
            font-size: 13px;
            padding: 7px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            transition: background .2s;
            margin-left: auto;
        }

        .kb-btn:hover {
            background: #1a7fdd;
        }

        .kb-agent-label {
            font-size: 12px;
            color: var(--text-secondary);
            padding: 4px 12px;
            background: rgba(31, 147, 255, .1);
            border-radius: 4px;
            border: 1px solid rgba(31, 147, 255, .2);
        }

        html, body {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        html::-webkit-scrollbar, body::-webkit-scrollbar {
            display: none;
        }

        .kb-board {
            display: flex;
            gap: 12px;
            padding: 16px;
            overflow-x: auto;
            overflow-y: hidden;
            flex: 1;
            min-height: 0;
            align-items: flex-start;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .kb-board::-webkit-scrollbar {
            display: none;
        }

        .kb-col {
            min-width: 290px;
            max-width: 320px;
            background: transparent;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            max-height: calc(100vh - 125px);
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .kb-col::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }

        .kb-col-header {
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 600;
            background: #111111;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .kb-col-count {
            margin-left: auto;
            background: var(--col-count-bg);
            border-radius: 999px;
            font-size: 11px;
            padding: 1px 7px;
        }

        .kb-col.col-novo .kb-col-header { background: var(--col-novo); border-bottom: 2px solid var(--col-novo-b); }
        .kb-col.col-pente .kb-col-header { background: var(--col-pente); border-bottom: 2px solid var(--col-pente-b); }
        .kb-col.col-aberto .kb-col-header { background: var(--col-aberto); border-bottom: 2px solid var(--col-aberto-b); }
        .kb-col.col-qualif .kb-col-header { background: var(--col-qualif); border-bottom: 2px solid var(--col-qualif-b); }
        .kb-col.col-negoc .kb-col-header { background: var(--col-negoc); border-bottom: 2px solid var(--col-negoc-b); }
        .kb-col.col-conv .kb-col-header { background: var(--col-conv); border-bottom: 2px solid var(--col-conv-b); }
        .kb-col.col-perd .kb-col-header { background: var(--col-perd); border-bottom: 2px solid var(--col-perd-b); }

        /* ══════ MODAL CARD ══════ */
        #kb-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.72); backdrop-filter: blur(6px);
            z-index: 50000; align-items: center; justify-content: center;
        }
        #kb-modal-overlay.open { display: flex; }
        #kb-modal {
            background: var(--bg-color); 
            border: 1px solid var(--border-color); 
            border-radius: 8px;
            width: 94%; max-width: 600px; max-height: 85vh; overflow-y: auto;
            box-shadow: 0 15px 40px rgba(0,0,0,.35); 
            animation: modalIn .15s ease-out;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        #kb-modal::-webkit-scrollbar { display: none; }
        @keyframes modalIn {
            from { opacity:0; transform: translateY(18px) scale(.97); }
            to   { opacity:1; transform: translateY(0) scale(1); }
        }
        #kb-modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 24px; border-bottom: 1px solid var(--border-color); gap: 10px;
        }
        #kb-modal-title { font-size: 15px; font-weight: 700; color: var(--text-primary); }
        #kb-modal-close {
            background: var(--border-color); border: none; border-radius: 50%;
            width: 28px; height: 28px; color: var(--text-secondary); cursor: pointer; font-size: 14px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        #kb-modal-body { padding: 24px; display: flex; flex-direction: column; gap: 14px; }
        .kb-modal-row { display: flex; align-items: center; gap: 12px; font-size: 13px; }
        .kb-modal-label { color: var(--accent-color); font-weight: 600; min-width: 125px; flex-shrink: 0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; }
        .kb-modal-val { color: var(--text-primary); word-break: break-word; }
        .kb-modal-divider { border: none; border-top: 1px solid var(--border-color); margin: 8px 0; }
        .kb-modal-notes {
            width: 100%; background: var(--bg-color); border: 1px solid var(--border-color);
            border-radius: 8px; color: var(--text-primary); font-size: 12px; font-family: inherit;
            padding: 10px 12px; resize: vertical; min-height: 90px;
        }
        .kb-modal-notes:focus { outline: none; border-color: #6366f1; }
        .kb-modal-footer {
            padding: 14px 20px; border-top: 1px solid var(--border-color);
            display: flex; gap: 10px; justify-content: flex-end;
        }
        .kb-modal-btn { padding: 8px 18px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .kb-modal-btn.primary { background: var(--accent-color); color: #fff; }
        .kb-modal-btn.secondary { background: var(--border-color); color: var(--text-primary); }
        .kb-status-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:10px; font-weight:700; background:rgba(255,255,255,.05); color:var(--text-secondary); border:1px solid var(--border-color); }
        
        .kb-modal-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            background: rgba(255,255,255,.05);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            margin-right: 4px;
            margin-bottom: 4px;
        }
        .kb-modal-resumo {
            background: rgba(255,255,255,.03);
            border: 1px dashed var(--border-color);
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 10px;
            line-height: 1.4;
            white-space: pre-wrap;
        }
        .kb-modal-action-btn {
            background: #10b981;
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }
        .kb-modal-action-btn:hover { background: #059669; }
        /* Card compacto */
        .kb-card-compact {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.15s ease-in-out;
            position: relative;
            background-clip: padding-box;
            user-select: none;
        }
        .kb-card-compact:hover {
            border-color: var(--accent-color);
            background: var(--card-bg);
            z-index: 5;
        }
        .kb-card-compact.dragging { opacity:.45; transform:rotate(2deg); }

        .kb-zone {
            padding: 8px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 80px;
        }

        .kb-zone.drag-over {
            background: rgba(99, 102, 241, .08);
            border-radius: 6px;
            outline: 2px dashed rgba(99, 102, 241, .4);
        }

        .kb-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 12px;
            cursor: grab;
            transition: transform .15s, box-shadow .15s;
            font-size: 12px;
        }

        .kb-card:active {
            cursor: grabbing;
        }

        .kb-card.dragging {
            opacity: .45;
            transform: rotate(2deg);
            box-shadow: 0 8px 24px rgba(0, 0, 0, .5);
        }

        .kb-card-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary, #e2e8f0);
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .kb-row {
            display: flex;
            gap: 5px;
            align-items: flex-start;
            color: var(--text-secondary, #8892a4);
            margin-bottom: 2px;
            line-height: 1.4;
            font-size: 11px;
        }

        .kb-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 5px;
        }

        .kb-chip {
            background: rgba(99, 102, 241, .12);
            color: #a5b4fc;
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 999px;
            border: 1px solid rgba(99, 102, 241, .25);
        }

        .kb-chip.g {
            background: rgba(16, 185, 129, .1);
            color: #6ee7b7;
            border-color: rgba(16, 185, 129, .2);
        }

        .kb-chip.y {
            background: rgba(245, 158, 11, .1);
            color: #fcd34d;
            border-color: rgba(245, 158, 11, .2);
        }

        .kb-chip.r {
            background: rgba(239, 68, 68, .1);
            color: #fca5a5;
            border-color: rgba(239, 68, 68, .2);
        }

        .kb-notas {
            width: 100%;
            margin-top: 7px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border-color, #2e3244);
            color: var(--text-primary, #e2e8f0);
            font-size: 11px;
            border-radius: 5px;
            padding: 5px 8px;
            resize: vertical;
            font-family: inherit;
            min-height: 44px;
        }

        .kb-actions {
            margin-top: 6px;
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .kb-save {
            font-size: 11px;
            background: var(--accent-color, #6366f1);
            color: #fff;
            border: none;
            border-radius: 5px;
            padding: 3px 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
        }

        .kb-link {
            font-size: 11px;
            color: #818cf8;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            font-family: inherit;
            text-decoration: underline;
        }

        .kb-empty {
            text-align: center;
            color: var(--text-secondary, #8892a4);
            padding: 20px;
            font-size: 11px;
            opacity: .5;
        }

        #kb-toast {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background: #1e293b;
            border: 1px solid #2e3244;
            color: #e2e8f0;
            font-size: 12px;
            padding: 10px 16px;
            border-radius: 8px;
            opacity: 0;
            transition: opacity .3s;
            pointer-events: none;
            z-index: 9999;
        }

        #kb-toast.show {
            opacity: 1;
        }

        /* Badge de Mensagens Não Lidas (V118) - Sugestão A */
        .kb-unread-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4d4f;
            color: white;
            font-size: 9px;
            font-weight: 800;
            min-width: 15px;
            height: 15px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 1px 4px rgba(255, 77, 79, 0.5);
            border: 1px solid var(--card-bg);
            z-index: 10;
            animation: kb-pulse-badge 2s infinite;
            line-height: 1;
        }

        @keyframes kb-pulse-badge {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 79, 0.6); }
            70% { transform: scale(1.15); box-shadow: 0 0 0 8px rgba(255, 77, 79, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 79, 0); }
        }

        /* Console Visual para Debug (Jobs Style) */
        .kb-debug-console {
            position: fixed;
            bottom: 60px;
            right: 16px;
            width: 300px;
            max-height: 200px;
            background: #000;
            color: #0f0;
            font-family: monospace;
            font-size: 10px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
            overflow-y: auto;
            z-index: 10000;
            display: none;
            opacity: 0.8;
        }
        .kb-debug-line { border-bottom: 1px solid #222; margin-bottom: 2px; }
        .kb-debug-time { color: #888; margin-right: 5px; }

        .kb-input-url {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 6px;
            font-family: monospace;
        }

        .kb-config-bar {
            padding: 8px 20px;
            background: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: center;
            font-size: 11px;
            color: var(--text-secondary);
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 91;
        }

        /* Unified Theme System moved to top */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            padding: 0;
            line-height: 1.5;
        }

        /* Centraliza apenas o conteudo do Cacador */
        .cacador-inner {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem;
            min-height: calc(100vh - 56px);
        }

        /* Body theme handling unified at top */

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--bg-color);
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid var(--border-color);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
        }

        header h1 {
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-primary);
        }

        header h1 i {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .version-badge {
            font-size: 0.7rem;
            background: var(--border-color);
            color: var(--text-secondary);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .theme-toggle {
            display: flex;
            gap: 0.5rem;
            background: var(--bg-color);
            padding: 0.35rem;
            border-radius: 9999px;
            border: 1px solid var(--border-color);
        }

        .theme-btn {
            background: none;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .theme-btn.active {
            background-color: var(--card-bg);
            color: var(--accent-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .content {
            padding: 3rem;
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 2.5rem;
        }

        .config-card {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border-color);
            transition: border-color 0.2s ease;
        }

        .config-card:hover {
            border-color: var(--accent-color);
        }

        .config-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1.25rem;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .config-header i {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .dropzone-container {
            margin-bottom: 2.5rem;
        }

        .dropzone {
            border: 2px dashed var(--border-color);
            background-color: var(--card-bg);
            border-radius: 1.25rem;
            padding: 0.75rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            min-height: 64px;
        }

        .dropzone:hover,
        .dropzone.dragover {
            border-color: var(--accent-color);
            background-color: rgba(99, 102, 241, 0.05);
        }

        .dropzone-text {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
            flex: 1;
        }

        .dropzone-text i {
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        .dropzone-btn {
            background: var(--card-bg);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .dropzone-btn:hover {
            background: var(--border-color);
        }
